<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobotomy Corporation</title>
    <style>
        body {
            background-color: black;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            height: 100vh;
            margin: 0;
        }
        #game-area {
            flex: 2;
            padding: 20px;
        }
        #sidebar {
            flex: 1;
            padding: 20px;
            border-left: 1px solid #0f0;
        }
        button {
            background-color: #0f0;
            border: none;
            cursor: pointer;
            padding: 10px;
            margin: 5px;
        }
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div id="game-area">
        <h1>Lobotomy Corporation</h1>
        <div id="employee-management">
            <h2>Employees:</h2>
            <ul id="employee-list"></ul>
        </div>
        <div id="event-log">
            <h2>Event Log:</h2>
            <ul id="log-list"></ul>
        </div>
    </div>
    <div id="sidebar">
        <h2>Controls</h2>
        <button onclick="assignWork('PE')">Assign PE Work</button>
        <button onclick="assignWork('Insight')">Assign Insight Work</button>
        <button onclick="assignWork('Attachment')">Assign Attachment Work</button>
        <button onclick="assignWork('Instinct')">Assign Instinct Work</button>
    </div>
    <script>
        let budget = 500;
        let employees = []; // Array to hold employee objects
        let abnormalities = []; // Array to hold abnormalities
        let dayCycle = 0;

        // Sample employee and abnormality data
        const sampleEmployees = [
            { name: 'Employee 1', sanity: 100, workType: 'PE' },
            { name: 'Employee 2', sanity: 100, workType: 'Insight' },
            // Add more employees...
        ];
        const sampleAbnormalities = [
            { name: 'Abnormality 1', threatLevel: 50 },
            { name: 'Abnormality 2', threatLevel: 75 },
            // Add more abnormalities...
        ];

        function initializeGame() {
            employees = sampleEmployees;
            abnormalities = sampleAbnormalities;
            updateEmployeeList();
            setInterval(updateGame, 1000);
        }

        function updateGame() {
            // Update game mechanics (sanity degradation, threat levels, etc.)
            employees.forEach(emp => {
                emp.sanity -= 1; // Decrease sanity
                if (emp.sanity <= 0) {
                    logEvent(emp.name + ' has suffered a breakdown.');
                }
            });
            // Add additional mechanics for abnormalities, etc.
        }

        function logEvent(message) {
            const logList = document.getElementById('log-list');
            const logItem = document.createElement('li');
            logItem.textContent = message;
            logList.appendChild(logItem);
        }

        function assignWork(type) {
            employees.forEach(emp => {
                if (emp.workType === type) {
                    logEvent(emp.name + ' is assigned to ' + type + ' work.');
                }
            });
        }

        function updateEmployeeList() {
            const employeeList = document.getElementById('employee-list');
            employeeList.innerHTML = '';
            employees.forEach(emp => {
                const listItem = document.createElement('li');
                listItem.textContent = emp.name + ' - Sanity: ' + emp.sanity;
                employeeList.appendChild(listItem);
            });
        }

        // Start the game
        initializeGame();
    </script>
</body>
</html>

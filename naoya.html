<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Projection Sorcery Demo</title>
<style>
  body { margin:0; background:#0a0a0f; color:white; text-align:center; }
  canvas { background:#111; display:block; margin:20px auto; border:2px solid #555; }
</style>
</head>
<body>

<h2>Projection Sorcery – 24 FPS Technique</h2>
<p>A/D = Move • W = Jump • J = Attack • K = Projection Dash</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const FPS = 24;
const STEP = 1000 / FPS;

class Fighter {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.w = 40;
    this.h = 80;
    this.color = color;

    this.vx = 0;
    this.vy = 0;
    this.onGround = false;

    this.facing = 1;
    this.after = [];
    this.isAttacking = false;
    this.attackTimer = 0;
  }

  get hitbox() {
    return { x: this.x, y: this.y, w: this.w, h: this.h };
  }

  get attackBox() {
    return {
      x: this.x + (this.facing === 1 ? this.w : -30),
      y: this.y + 20,
      w: 30,
      h: 20
    };
  }

  projectionDash() {
    // Snap forward several frames instantly (Projection Sorcery effect)
    const burst = 18;
    this.x += this.facing * burst;

    // Add strong afterimages
    for (let i = 0; i < 4; i++) {
      this.after.push({ x: this.x - this.facing * i * 6, y: this.y, alpha: 0.4 - i * 0.1 });
    }
  }

  attack() {
    this.isAttacking = true;
    this.attackTimer = 6; // 6 frames at 24fps
  }

  update() {
    // Gravity
    this.vy += 0.7;
    this.y += this.vy;
    this.x += this.vx;

    // Ground
    const ground = canvas.height - 40;
    if (this.y + this.h > ground) {
      this.y = ground - this.h;
      this.vy = 0;
      this.onGround = true;
    } else {
      this.onGround = false;
    }

    // Attack timer
    if (this.isAttacking) {
      this.attackTimer--;
      if (this.attackTimer <= 0) this.isAttacking = false;
    }

    // Afterimages fade
    this.after.forEach(a => a.alpha -= 0.05);
    this.after = this.after.filter(a => a.alpha > 0);
  }

  draw() {
    // Afterimages
    for (const a of this.after) {
      ctx.fillStyle = `rgba(100,200,255,${a.alpha})`;
      ctx.fillRect(a.x, a.y, this.w, this.h);
    }

    // Body
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.w, this.h);

    // Attack box (debug)
    if (this.isAttacking) {
      const atk = this.attackBox;
      ctx.fillStyle = "rgba(255,100,150,0.5)";
      ctx.fillRect(atk.x, atk.y, atk.w, atk.h);
    }
  }
}

const player = new Fighter(150, 200, "#4da6ff");
const enemy = new Fighter(600, 200, "#ff4d4d");

const keys = { a:false, d:false, w:false, j:false, k:false };

document.addEventListener("keydown", e => {
  if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
});
document.addEventListener("keyup", e => {
  if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
});

function updatePlayer() {
  player.vx = 0;

  if (keys.a) { player.vx = -4; player.facing = -1; }
  if (keys.d) { player.vx = 4; player.facing = 1; }

  if (keys.w && player.onGround) player.vy = -14;

  if (keys.k) player.projectionDash();
  if (keys.j) player.attack();

  player.update();
}

function updateEnemy() {
  // Simple dummy AI
  const dx = player.x - enemy.x;
  enemy.vx = Math.sign(dx) * 2;
  enemy.facing = dx >= 0 ? 1 : -1;

  enemy.update();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

  player.draw();
  enemy.draw();
}

let last = performance.now();
let acc = 0;

function loop(now) {
  const delta = now - last;
  last = now;
  acc += delta;

  while (acc >= STEP) {
    updatePlayer();
    updateEnemy();
    acc -= STEP;
  }

  draw();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>

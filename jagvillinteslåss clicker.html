<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jag Vill Inte Slåss – Idle Clicker</title>
<style>
    body {
        background:#1e1e1e;
        color:white;
        font-family:Arial, sans-serif;
        padding:20px;
    }
    #clickButton {
        padding:20px 40px;
        font-size:24px;
        cursor:pointer;
        background:#4caf50;
        border:none;
        border-radius:10px;
        color:white;
    }
    .shopItem, .upgradeItem {
        border:1px solid #555;
        padding:10px;
        margin:10px 0;
        border-radius:8px;
        cursor:pointer;
        background:#2e2e2e;
    }
    .shopItem:hover, .upgradeItem:hover {
        background:#3a3a3a;
    }
</style>
</head>
<body>

<h1>Jag Vill Inte Slåss – Idle Game</h1>
<p>Peace Points: <span id="points">0</span></p>
<p>Points per Click: <span id="ppc">1</span></p>
<p>Passive Points per Second: <span id="pps">0</span></p>

<button id="clickButton">Jag vill inte slåss!</button>

<h2>Buildings</h2>
<div id="shop"></div>

<h2>Upgrades</h2>
<div id="upgrades"></div>

<script>
// ------------------------------
// Core Game Variables
// ------------------------------
let points = 0;
let pointsPerClick = 1;
let passivePerSecond = 0;

// ------------------------------
// Building Definitions
// ------------------------------
let buildings = [
    {
        name: "Whispering Hut",
        desc: "A tiny hut where villagers quietly repeat 'jag vill inte slåss'.",
        baseCost: 20,
        amount: 0,
        baseRate: 1,
        id: "hut"
    },
    {
        name: "Pacifist Tower",
        desc: "A tall tower broadcasting peaceful vibes.",
        baseCost: 100,
        amount: 0,
        baseRate: 5,
        id: "tower"
    },
    {
        name: "Non‑Aggression Farm",
        desc: "Crops grow better when nobody fights.",
        baseCost: 500,
        amount: 0,
        baseRate: 20,
        id: "farm"
    }
];

// ------------------------------
// Upgrade Definitions
// ------------------------------
let upgrades = [
    {
        name: "Soft‑Spoken Training",
        desc: "Increase click power by teaching gentler voice lines.",
        cost: 50,
        effect: () => { pointsPerClick += 1; },
        purchased: false
    },
    {
        name: "Hut Meditation Mats",
        desc: "Whispering Huts produce twice as much.",
        cost: 150,
        effect: () => { buildings[0].baseRate *= 2; },
        purchased: false
    },
    {
        name: "Tower Peace Amplifiers",
        desc: "Pacifist Towers output +100% peaceful energy.",
        cost: 500,
        effect: () => { buildings[1].baseRate *= 2; },
        purchased: false
    }
];

// ------------------------------
// Rendering Functions
// ------------------------------
function render() {
    document.getElementById("points").textContent = Math.floor(points);
    document.getElementById("ppc").textContent = pointsPerClick;
    document.getElementById("pps").textContent = passivePerSecond;

    renderShop();
    renderUpgrades();
}

function renderShop() {
    let shopDiv = document.getElementById("shop");
    shopDiv.innerHTML = "";

    buildings.forEach((b, index) => {
        let cost = Math.floor(b.baseCost * Math.pow(1.15, b.amount));
        let item = document.createElement("div");
        item.className = "shopItem";
        item.innerHTML = `
            <strong>${b.name}</strong><br>
            ${b.desc}<br>
            Cost: ${cost} | Owned: ${b.amount}
        `;
        item.onclick = () => buyBuilding(index);
        shopDiv.appendChild(item);
    });
}

function renderUpgrades() {
    let upDiv = document.getElementById("upgrades");
    upDiv.innerHTML = "";

    upgrades.forEach((u, index) => {
        if (!u.purchased) {
            let item = document.createElement("div");
            item.className = "upgradeItem";
            item.innerHTML = `
                <strong>${u.name}</strong><br>
                ${u.desc}<br>
                Cost: ${u.cost}
            `;
            item.onclick = () => buyUpgrade(index);
            upDiv.appendChild(item);
        }
    });
}

// ------------------------------
// Game Logic
// ------------------------------
document.getElementById("clickButton").onclick = () => {
    points += pointsPerClick;
    render();
};

function buyBuilding(i) {
    let b = buildings[i];
    let cost = Math.floor(b.baseCost * Math.pow(1.15, b.amount));

    if (points >= cost) {
        points -= cost;
        b.amount++;
        updatePassiveRate();
        render();
    }
}

function buyUpgrade(i) {
    let u = upgrades[i];
    if (points >= u.cost) {
        points -= u.cost;
        u.purchased = true;
        u.effect();
        updatePassiveRate();
        render();
    }
}

function updatePassiveRate() {
    passivePerSecond = 0;
    buildings.forEach(b => {
        passivePerSecond += b.amount * b.baseRate;
    });
}

// Passive income loop
setInterval(() => {
    points += passivePerSecond;
    render();
}, 1000);

// Initial render
render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard + Roguelike Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; overflow: hidden; }
        
        #tabs { display: flex; gap: 0; background: #0f3460; border-bottom: 3px solid #e94560; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; background: #0f3460; color: #00ff00; border: 2px solid #e94560; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .tab-btn:hover { background: #1a1a2e; }
        .tab-btn.active { background: #e94560; color: #fff; }
        
        .tab-content { display: none; width: 100%; height: calc(100vh - 60px); overflow-y: auto; }
        .tab-content.active { display: block; }
        
        /* WEATHER DASHBOARD */
        #weather-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .weather-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .weather-card { background: #0f3460; border: 3px solid #e94560; padding: 20px; border-radius: 8px; }
        .weather-card h2 { color: #ffff00; margin-bottom: 15px; text-transform: uppercase; }
        .weather-stat { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px; background: #1a1a2e; border-left: 3px solid #e94560; }
        .weather-stat span:first-child { color: #00ff00; }
        .weather-stat span:last-child { color: #ffff00; font-weight: bold; }
        .weather-icon { font-size: 48px; text-align: center; margin: 10px 0; }
        
        input, button { padding: 10px; margin: 10px 0; font-size: 14px; border: 2px solid #e94560; background: #0f3460; color: #00ff00; cursor: pointer; }
        input { width: 100%; max-width: 300px; }
        button { background: #e94560; color: #fff; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #ff6b6b; }
        
        .error { color: #ff0000; padding: 10px; background: #3a1a1a; border-left: 3px solid #ff0000; margin: 10px 0; }
        .loading { color: #ffff00; padding: 10px; text-align: center; font-weight: bold; }
        
        /* GAME */
        #gameContainer { display: flex; height: 100%; }
        #gameCanvas { flex: 1; background: #0f0f0f; border-right: 3px solid #e94560; }
        #gameHUD { width: 320px; background: #0f3460; padding: 15px; overflow-y: auto; border-left: 3px solid #e94560; }
        
        .hudSection { padding: 12px; border: 2px solid #e94560; background: #1a1a2e; margin: 10px 0; border-radius: 4px; }
        .hudTitle { color: #e94560; font-weight: bold; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #e94560; padding-bottom: 5px; }
        .hudItem { font-size: 11px; margin: 4px 0; color: #00ff00; }
        .stat { color: #ffff00; }
        
        .healthBar { width: 100%; height: 18px; background: #000; border: 2px solid #ff0000; margin: 5px 0; border-radius: 2px; overflow: hidden; }
        .healthFill { height: 100%; background: #00ff00; transition: width 0.1s; }
        
        .itemGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin: 5px 0; }
        .itemSlot { aspect-ratio: 1; background: #0f3460; border: 2px solid #e94560; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
        .itemSlot.empty { opacity: 0.5; }
        
        #gameButtons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        #gameButtons button { margin: 0; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
    </style>
</head>
<body>

<div id="tabs">
    <button class="tab-btn active" onclick="switchTab('weather')">🌤️ WEATHER</button>
    <button class="tab-btn" onclick="switchTab('game')">🎮 GAME</button>
</div>

<!-- WEATHER TAB -->
<div id="weather" class="tab-content active">
    <div id="weather-container">
        <h1>⛈️ WEATHER DASHBOARD</h1>
        
        <div style="margin: 20px 0;">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="New York">
            <button onclick="searchWeather()">SEARCH</button>
            <button onclick="getLocationWeather()">USE MY LOCATION</button>
        </div>
        
        <div id="weatherError"></div>
        <div id="weatherLoading"></div>
        <div id="weatherData" class="weather-grid"></div>
    </div>
</div>

<!-- GAME TAB -->
<div id="game" class="tab-content">
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameHUD">
            <div class="hudSection">
                <div class="hudTitle">GAME INFO</div>
                <div class="hudItem">Floor: <span id="gameFloor">1</span></div>
                <div class="hudItem">Room: <span id="gameRoom">1/10</span></div>
                <div class="hudItem stat">Level: <span id="gameLevel">1</span></div>
                <div class="hudItem">XP: <span id="gameXP">0/100</span></div>
            </div>
            
            <div class="hudSection">
                <div class="hudTitle">HEALTH</div>
                <div class="healthBar"><div class="healthFill" id="healthBar"></div></div>
                <div class="hudItem stat" id="healthText">10/10</div>
            </div>
            
            <div class="hudSection">
                <div class="hudTitle">STATS</div>
                <div class="hudItem">Damage: <span id="gameDamage">1.0</span></div>
                <div class="hudItem">Speed: <span id="gameSpeed">1.0</span></div>
                <div class="hudItem">Fire: <span id="gameFire">1.0</span></div>
                <div class="hudItem">Range: <span id="gameRange">100</span></div>
                <div class="hudItem">Luck: <span id="gameLuck">0</span></div>
            </div>
            
            <div class="hudSection">
                <div class="hudTitle">RESOURCES</div>
                <div class="hudItem">Gold: <span id="gameGold">0</span></div>
                <div class="hudItem">Bombs: <span id="gameBombs">0</span></div>
                <div class="hudItem">Score: <span id="gameScore">0</span></div>
            </div>
            
            <div class="hudSection">
                <div class="hudTitle">INVENTORY</div>
                <div class="itemGrid" id="gameInventory"></div>
            </div>
            
            <div id="gameButtons">
                <button onclick="toggleGamePause()">PAUSE</button>
                <button onclick="restartGameSession()">RESTART</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================================
// WEATHER DASHBOARD
// ============================================================================
const WEATHER_API_KEY = 'a6d3e805c3fe41a5b1e70fffa80f8b54';
const WEATHER_API_URL = 'https://api.openweathermap.org/data/2.5/weather';
const GEO_API_URL = 'https://api.openweathermap.org/geo/1.0/direct';

function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
    
    if (tab === 'game') {
        if (!gameCanvas.width) {
            initGame();
        }
    }
}

function searchWeather() {
    const city = document.getElementById('cityInput').value;
    if (!city) return;
    fetchWeather(city);
}

function getLocationWeather() {
    if (!navigator.geolocation) {
        showWeatherError('Geolocation not supported');
        return;
    }
    
    showWeatherLoading('Getting your location...');
    navigator.geolocation.getCurrentPosition(
        pos => {
            const { latitude, longitude } = pos.coords;
            fetch(`${WEATHER_API_URL}?lat=${latitude}&lon=${longitude}&appid=${WEATHER_API_KEY}&units=metric`)
                .then(r => r.json())
                .then(displayWeather)
                .catch(err => showWeatherError('Failed to fetch weather: ' + err.message));
        },
        err => showWeatherError('Location access denied')
    );
}

function fetchWeather(city) {
    showWeatherLoading('Fetching weather...');
    fetch(`${WEATHER_API_URL}?q=${city}&appid=${WEATHER_API_KEY}&units=metric`)
        .then(r => r.json())
        .then(data => {
            if (data.cod === '404') {
                showWeatherError('City not found');
            } else {
                displayWeather(data);
            }
        })
        .catch(err => showWeatherError('Error: ' + err.message));
}

function displayWeather(data) {
    clearWeatherMessages();
    const weatherDiv = document.getElementById('weatherData');
    
    const current = data.main;
    const wind = data.wind;
    const cloud = data.clouds;
    const weather = data.weather[0];
    
    const weatherIcon = getWeatherIcon(weather.main);
    
    weatherDiv.innerHTML = `
        <div class="weather-card">
            <h2>${data.name}, ${data.sys.country}</h2>
            <div class="weather-icon">${weatherIcon}</div>
            <div class="weather-stat">
                <span>Temperature</span>
                <span>${current.temp}°C</span>
            </div>
            <div class="weather-stat">
                <span>Feels Like</span>
                <span>${current.feels_like}°C</span>
            </div>
            <div class="weather-stat">
                <span>Humidity</span>
                <span>${current.humidity}%</span>
            </div>
            <div class="weather-stat">
                <span>Pressure</span>
                <span>${current.pressure} hPa</span>
            </div>
            <div class="weather-stat">
                <span>Condition</span>
                <span>${weather.main}</span>
            </div>
            <div class="weather-stat">
                <span>Wind Speed</span>
                <span>${wind.speed} m/s</span>
            </div>
            <div class="weather-stat">
                <span>Cloudiness</span>
                <span>${cloud.all}%</span>
            </div>
            <div class="weather-stat">
                <span>Visibility</span>
                <span>${(data.visibility / 1000).toFixed(1)} km</span>
            </div>
        </div>
    `;
}

function getWeatherIcon(condition) {
    const icons = {
        'Clear': '☀️',
        'Clouds': '☁️',
        'Rain': '🌧️',
        'Drizzle': '🌦️',
        'Thunderstorm': '⛈️',
        'Snow': '❄️',
        'Mist': '🌫️',
        'Smoke': '💨',
        'Haze': '🌫️',
        'Dust': '🌪️',
        'Fog': '🌫️',
        'Sand': '🌪️',
        'Ash': '💨',
        'Squall': '🌪️',
        'Tornado': '🌪️'
    };
    return icons[condition] || '🌤️';
}

function showWeatherError(msg) {
    const errorDiv = document.getElementById('weatherError');
    errorDiv.innerHTML = `<div class="error">⚠️ ${msg}</div>`;
    document.getElementById('weatherLoading').innerHTML = '';
    document.getElementById('weatherData').innerHTML = '';
}

function showWeatherLoading(msg) {
    document.getElementById('weatherLoading').innerHTML = `<div class="loading">⏳ ${msg}</div>`;
    document.getElementById('weatherError').innerHTML = '';
}

function clearWeatherMessages() {
    document.getElementById('weatherError').innerHTML = '';
    document.getElementById('weatherLoading').innerHTML = '';
}

// ============================================================================
// ROGUELIKE GAME
// ============================================================================
const SCREEN_WIDTH = 960, SCREEN_HEIGHT = 720;
const TILE = 30, COLS = 13, ROWS = 12;
const MAP_W = COLS * TILE, MAP_H = ROWS * TILE;
const PLAYER_R = 12;

let gameCanvas, gameCtx;
let gameState = { floor: 1, room: 1, paused: false, gameOver: false, won: false };
let player = {
    x: MAP_W/2, y: MAP_H/2, vx: 0, vy: 0, r: PLAYER_R,
    maxHp: 10, hp: 10, dmg: 1, fireRate: 30, range: 100, spd: 1.5, luck: 0,
    gold: 0, bombs: 0, level: 1, xp: 0, xpNext: 100, score: 0, inv: [], active: null, invul: 0
};

let enemies = [], obstacles = [], pickups = [], particles = [], tears = [];
let rooms = [], curRoom = 0;
let keys = {};

const ITEMS = {
    'tears': {n:'Tears', t:'p', s:'fireRate', v:-5, e:'💧'},
    'damage': {n:'D6', t:'p', s:'damage', v:0.5, e:'🎲'},
    'speed': {n:'Speed', t:'p', s:'speed', v:0.5, e:'⚡'},
    'range': {n:'Range', t:'p', s:'range', v:30, e:'🎯'},
    'health': {n:'Heart', t:'p', s:'health', v:2, e:'❤️'},
    'luck': {n:'Clover', t:'p', s:'luck', v:1, e:'🍀'},
    'bombs': {n:'Bombs', t:'p', s:'bombs', v:5, e:'💣'},
    'shield': {n:'Shield', t:'a', e:'🛡️'},
    'sword': {n:'Sword', t:'p', s:'damage', v:2, e:'⚔️'},
};

const ENEMIES = {
    'goblin': {hp:5, spd:1.2, dmg:1, sz:10, xp:15, e:'👹', att:80},
    'fly': {hp:3, spd:1.8, dmg:0.5, sz:8, xp:10, e:'🪰', att:100},
    'spider': {hp:8, spd:1, dmg:1.5, sz:12, xp:20, e:'🕷️', att:70},
    'demon': {hp:12, spd:1.5, dmg:2, sz:14, xp:30, e:'👿', att:60},
    'pooter': {hp:6, spd:0.8, dmg:1, sz:11, xp:15, e:'💨', att:90},
    'knight': {hp:15, spd:1, dmg:2.5, sz:13, xp:40, e:'⚔️', att:50},
};

const BOSSES = {
    'monstro': {hp:100, spd:0.8, dmg:2, sz:35, e:'🦖', att:70},
    'mom': {hp:120, spd:0.6, dmg:2.5, sz:40, e:'👩', att:60},
    'blue_baby': {hp:80, spd:1.2, dmg:1.5, sz:32, e:'👶', att:80},
    'satan': {hp:150, spd:1, dmg:3, sz:38, e:'😈', att:50},
    'isaac': {hp:100, spd:1.1, dmg:2, sz:30, e:'👦', att:75},
};

function initGame() {
    gameCanvas = document.getElementById('gameCanvas');
    gameCtx = gameCanvas.getContext('2d');
    gameCanvas.width = SCREEN_WIDTH;
    gameCanvas.height = SCREEN_HEIGHT;
    
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === 'Escape') toggleGamePause();
        if (e.key === ' ') nextGameRoom();
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    gameCanvas.addEventListener('click', e => {
        if (gameState.paused || gameState.gameOver || gameState.won) return;
        const r = gameCanvas.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        fireGameTear(x, y);
    });
    
    genGameFloor();
    loadGameRoom(0);
    gameGameLoop();
}

function genGameFloor() {
    rooms = [];
    for (let i = 0; i < 10; i++) {
        rooms.push({
            t: i === 9 ? 'boss' : (Math.random() < 0.2 ? 'treasure' : 'normal'),
            cleared: false, visited: false
        });
    }
}

function loadGameRoom(i) {
    curRoom = i;
    gameState.room = i + 1;
    rooms[i].visited = true;
    
    enemies = [];
    obstacles = [];
    pickups = [];
    tears = [];
    particles = [];
    player.x = MAP_W/2;
    player.y = MAP_H/2;
    
    for (let j = 0; j < 5 + Math.random() * 5; j++) {
        let x, y, ok = true;
        do {
            x = 40 + Math.random() * (MAP_W - 80);
            y = 40 + Math.random() * (MAP_H - 80);
            ok = Math.hypot(x - player.x, y - player.y) > 100;
        } while (!ok);
        obstacles.push({x, y, w: 25 + Math.random() * 35, h: 25 + Math.random() * 35, hp: 2, maxHp: 2});
    }
    
    const room = rooms[i];
    if (room.t === 'boss') {
        const bossKeys = Object.keys(BOSSES);
        const bossKey = bossKeys[Math.floor(Math.random() * bossKeys.length)];
        const bossData = BOSSES[bossKey];
        enemies.push({
            x: MAP_W/2, y: MAP_H/2, vx: 0, vy: 0,
            type: bossKey, hp: bossData.hp, maxHp: bossData.hp,
            data: bossData, isBoss: true, shoot: 0, phase: 1
        });
    } else if (room.t === 'treasure') {
        for (let j = 0; j < 3; j++) {
            const itemKeys = Object.keys(ITEMS);
            const itemKey = itemKeys[Math.floor(Math.random() * itemKeys.length)];
            pickups.push({x: 150 + j * 280, y: 250, t:'item', item: itemKey, vx:0, vy:0, lifetime:600, float:0});
        }
        const enemyKeys = Object.keys(ENEMIES);
        spawnGameEnemy(enemyKeys[Math.floor(Math.random() * enemyKeys.length)]);
    } else {
        const cnt = 3 + gameState.floor + Math.random() * 3;
        for (let j = 0; j < cnt; j++) {
            const enemyKeys = Object.keys(ENEMIES);
            spawnGameEnemy(enemyKeys[Math.floor(Math.random() * enemyKeys.length)]);
        }
    }
    
    updateGameHUD();
}

function spawnGameEnemy(type) {
    const data = ENEMIES[type];
    let x, y, ok = true;
    do {
        x = 50 + Math.random() * (MAP_W - 100);
        y = 50 + Math.random() * (MAP_H - 100);
        ok = Math.hypot(x - player.x, y - player.y) > 150;
    } while (!ok);
    
    enemies.push({
        x, y, vx: 0, vy: 0, type,
        hp: data.hp, maxHp: data.hp,
        data, shoot: 0, isBoss: false
    });
}

function updateGame() {
    if (gameState.paused || gameState.gameOver || gameState.won) return;
    
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    
    if (mx !== 0 || my !== 0) {
        const len = Math.hypot(mx, my);
        player.vx = (mx / len) * player.spd;
        player.vy = (my / len) * player.spd;
    }
    
    player.x += player.vx;
    player.y += player.vy;
    player.x = Math.max(player.r, Math.min(MAP_W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(MAP_H - player.r, player.y));
    
    obstacles.forEach(obs => {
        if (circleRectCollide(player.x, player.y, player.r, obs.x, obs.y, obs.w, obs.h)) {
            player.x -= player.vx;
            player.y -= player.vy;
        }
    });
    
    if (player.invul > 0) player.invul--;
    
    // TEARS UPDATE - FIXED COLLISION
    tears = tears.filter(t => {
        t.x += t.vx;
        t.y += t.vy;
        t.lifetime--;
        
        if (t.x < 0 || t.x > MAP_W || t.y < 0 || t.y > MAP_H) return false;
        
        let hit = false;
        for (let e of enemies) {
            const dist = Math.hypot(t.x - e.x, t.y - e.y);
            if (dist < e.data.sz / 2 + 6) {
                e.hp -= player.dmg;
                makeGameParticles(t.x, t.y, 8, '#00aaff');
                hit = true;
                break;
            }
        }
        
        for (let o of obstacles) {
            if (circleRectCollide(t.x, t.y, 5, o.x, o.y, o.w, o.h)) {
                o.hp--;
                hit = true;
                break;
            }
        }
        
        return t.lifetime > 0 && !hit;
    });
    
    // ENEMIES UPDATE
    enemies = enemies.filter(e => {
        if (e.hp <= 0) {
            makeGameParticles(e.x, e.y, 20, '#ff6b6b');
            player.xp += e.data.xp;
            player.gold += Math.floor(e.data.xp * 0.4);
            player.score += e.data.xp;
            
            if (Math.random() < 0.25) {
                const itemKeys = Object.keys(ITEMS);
                addGamePickup(e.x, e.y, 'item', itemKeys[Math.floor(Math.random() * itemKeys.length)]);
            }
            
            if (e.isBoss) {
                gameState.won = true;
                addGamePickup(e.x - 40, e.y, 'item', Object.keys(ITEMS)[Math.floor(Math.random() * Object.keys(ITEMS).length)]);
                addGamePickup(e.x + 40, e.y, 'item', Object.keys(ITEMS)[Math.floor(Math.random() * Object.keys(ITEMS).length)]);
                makeGameParticles(e.x, e.y, 40, '#ffff00');
            }
            
            return false;
        }
        
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist < 350) {
            e.vx = (dx / dist) * e.data.spd;
            e.vy = (dy / dist) * e.data.spd;
        } else {
            e.vx *= 0.85;
            e.vy *= 0.85;
        }
        
        e.x += e.vx;
        e.y += e.vy;
        e.x = Math.max(e.data.sz/2, Math.min(MAP_W - e.data.sz/2, e.x));
        e.y = Math.max(e.data.sz/2, Math.min(MAP_H - e.data.sz/2, e.y));
        
        e.shoot++;
        if (e.shoot > e.data.att) {
            if (Math.hypot(player.x - e.x, player.y - e.y) < 300) {
                const ang = Math.atan2(player.y - e.y, player.x - e.x);
                const spread = e.isBoss ? 0.4 : 0;
                for (let i = -1; i <= 1; i++) {
                    const a = ang + i * spread;
                    pickups.push({
                        x:e.x, y:e.y,
                        vx:Math.cos(a)*3,
                        vy:Math.sin(a)*3,
                        t:'proj',
                        lifetime:300,
                        dmg:e.data.dmg,
                        float:0
                    });
                }
            }
            e.shoot = 0;
        }
        
        if (player.invul <= 0 && Math.hypot(player.x - e.x, player.y - e.y) < player.r + e.data.sz/2) {
            player.hp--;
            player.invul = 120;
            makeGameParticles(player.x, player.y, 15, '#ff0000');
            if (player.hp <= 0) gameState.gameOver = true;
        }
        
        return true;
    });
    
    // PICKUPS UPDATE
    pickups = pickups.filter(p => {
        if (p.t === 'proj') {
            p.x += p.vx;
            p.y += p.vy;
            p.lifetime--;
            
            if (p.x < 0 || p.x > MAP_W || p.y < 0 || p.y > MAP_H) return false;
            
            if (player.invul <= 0 && Math.hypot(p.x - player.x, p.y - player.y) < player.r + 6) {
                player.hp -= p.dmg;
                player.invul = 120;
                makeGameParticles(player.x, player.y, 15, '#ff0000');
                if (player.hp <= 0) gameState.gameOver = true;
                return false;
            }
            return p.lifetime > 0;
        }
        
        if (p.t === 'portal') {
            if (Math.hypot(p.x - player.x, p.y - player.y) < 30) nextGameRoom();
            return true;
        }
        
        const dist = Math.hypot(p.x - player.x, p.y - player.y);
        if (dist < 40) {
            if (p.t === 'gold') {
                player.gold += 5;
                player.score += 5;
            } else if (p.t === 'item') {
                addItemToGameInventory(p.item);
            }
            makeGameParticles(p.x, p.y, 8, '#ffaa00');
            return false;
        }
        
        p.float++;
        p.y += Math.sin(p.float * 0.05) * 0.15;
        return true;
    });
    
    // PARTICLES
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.92;
        p.vy *= 0.92;
        p.lifetime--;
        return p.lifetime > 0;
    });
    
    // LEVEL UP
    if (player.xp >= player.xpNext) {
        player.xp -= player.xpNext;
        player.level++;
        player.xpNext = Math.floor(player.xpNext * 1.15);
        player.maxHp += 2;
        player.hp = player.maxHp;
        makeGameParticles(player.x, player.y, 25, '#00ff00');
    }
    
    // ROOM CLEAR
    if (enemies.length === 0 && rooms[curRoom].visited && !rooms[curRoom].cleared) {
        rooms[curRoom].cleared = true;
        addGamePickup(MAP_W / 2, MAP_H / 2, 'portal', null);
    }
    
    updateGameHUD();
}

function fireGameTear(sx, sy) {
    const cx = SCREEN_WIDTH / 2, cy = SCREEN_HEIGHT / 2;
    const dx = sx - cx, dy = sy - cy;
    const dist = Math.hypot(dx, dy);
    if (dist === 0) return;
    
    const spd = 6.5;
    tears.push({
        x: player.x, y: player.y,
        vx: (dx / dist) * spd,
        vy: (dy / dist) * spd,
        damage: 1,
        lifetime: 350
    });
}

function addItemToGameInventory(itemKey) {
    const item = ITEMS[itemKey];
    if (item.t === 'p') applyGamePassiveItem(itemKey);
    else player.active = itemKey;
    if (player.inv.length < 6) player.inv.push(itemKey);
}

function applyGamePassiveItem(itemKey) {
    const item = ITEMS[itemKey];
    if (item.s === 'damage') player.dmg += item.v;
    else if (item.s === 'fireRate') player.fireRate = Math.max(5, player.fireRate + item.v);
    else if (item.s === 'speed') player.spd += item.v;
    else if (item.s === 'range') player.range += item.v;
    else if (item.s === 'health') {
        player.maxHp += item.v;
        player.hp = player.maxHp;
    } else if (item.s === 'luck') player.luck += item.v;
    else if (item.s === 'bombs') player.bombs += item.v;
}

function addGamePickup(x, y, t, item) {
    pickups.push({x, y, t, item, vx:0, vy:0, lifetime:600, float:0});
}

function drawGame() {
    gameCtx.fillStyle = '#0f0f0f';
    gameCtx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    
    gameCtx.strokeStyle = '#1a1a1a';
    gameCtx.lineWidth = 1;
    for (let x = 0; x <= MAP_W; x += TILE) {
        gameCtx.beginPath();
        gameCtx.moveTo(x, 0);
        gameCtx.lineTo(x, MAP_H);
        gameCtx.stroke();
    }
    for (let y = 0; y <= MAP_H; y += TILE) {
        gameCtx.beginPath();
        gameCtx.moveTo(0, y);
        gameCtx.lineTo(MAP_W, y);
        gameCtx.stroke();
    }
    
    obstacles.forEach(o => {
        const hpPct = o.hp / o.maxHp;
        gameCtx.fillStyle = `rgb(${Math.floor(150 * hpPct)}, ${Math.floor(150 * hpPct)}, 50)`;
        gameCtx.fillRect(o.x, o.y, o.w, o.h);
        gameCtx.strokeStyle = '#999';
        gameCtx.lineWidth = 2;
        gameCtx.strokeRect(o.x, o.y, o.w, o.h);
    });
    
    enemies.forEach(e => {
        gameCtx.fillStyle = e.isBoss ? '#ff0000' : '#ff6b6b';
        gameCtx.beginPath();
        gameCtx.arc(e.x, e.y, e.data.sz / 2, 0, Math.PI * 2);
        gameCtx.fill();
        
        gameCtx.fillStyle = '#00ff00';
        const barW = 50, barH = 5;
        const hpPct = e.hp / e.maxHp;
        gameCtx.fillRect(e.x - barW / 2, e.y - 35, barW * hpPct, barH);
        gameCtx.strokeStyle = '#fff';
        gameCtx.lineWidth = 1;
        gameCtx.strokeRect(e.x - barW / 2, e.y - 35, barW, barH);
        
        gameCtx.font = '16px Arial';
        gameCtx.textAlign = 'center';
        gameCtx.textBaseline = 'middle';
        gameCtx.fillText(e.data.e, e.x, e.y);
    });
    
    pickups.forEach(p => {
        if (p.t === 'proj') {
            gameCtx.fillStyle = '#ff3333';
            gameCtx.beginPath();
            gameCtx.arc(p.x, p.y, 6, 0, Math.PI * 2);
            gameCtx.fill();
        }
    });
    
    gameCtx.fillStyle = '#00aaff';
    tears.forEach(t => {
        gameCtx.beginPath();
        gameCtx.arc(t.x, t.y, 4, 0, Math.PI * 2);
        gameCtx.fill();
    });
    
    pickups.forEach(p => {
        if (p.t === 'item') {
            const item = ITEMS[p.item];
            gameCtx.font = 'bold 28px Arial';
            gameCtx.textAlign = 'center';
            gameCtx.textBaseline = 'middle';
            gameCtx.fillText(item.e, p.x, p.y);
        } else if (p.t === 'gold') {
            gameCtx.fillStyle = '#ffff00';
            gameCtx.fillRect(p.x - 7, p.y - 7, 14, 14);
        } else if (p.t === 'portal') {
            gameCtx.fillStyle = '#ff00ff';
            gameCtx.beginPath();
            gameCtx.arc(p.x, p.y, 18, 0, Math.PI * 2);
            gameCtx.fill();
            gameCtx.fillStyle = '#ffff00';
            gameCtx.font = '28px Arial';
            gameCtx.textAlign = 'center';
            gameCtx.textBaseline = 'middle';
            gameCtx.fillText('🚪', p.x, p.y);
        }
    });
    
    particles.forEach(p => {
        gameCtx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${(p.lifetime / p.maxLifetime) * 0.9})`;
        gameCtx.beginPath();
        gameCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        gameCtx.fill();
    });
    
    if (player.invul % 12 < 6) {
        gameCtx.fillStyle = '#ffff00';
        gameCtx.beginPath();
        gameCtx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        gameCtx.fill();
        gameCtx.fillStyle = '#000';
        gameCtx.font = 'bold 18px Arial';
        gameCtx.textAlign = 'center';
        gameCtx.textBaseline = 'middle';
        gameCtx.fillText('👁️', player.x, player.y);
    }
    
    if (gameState.paused) {
        gameCtx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        gameCtx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
        gameCtx.fillStyle = '#ffff00';
        gameCtx.font = 'bold 52px Arial';
        gameCtx.textAlign = 'center';
        gameCtx.textBaseline = 'middle';
        gameCtx.fillText('PAUSED', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2);
    }
    
    if (gameState.gameOver) {
        gameCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        gameCtx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
        gameCtx.fillStyle = '#ff0000';
        gameCtx.font = 'bold 52px Arial';
        gameCtx.textAlign = 'center';
        gameCtx.textBaseline = 'middle';
        gameCtx.fillText('GAME OVER', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 - 40);
        gameCtx.fillStyle = '#ffff00';
        gameCtx.font = '24px Arial';
        gameCtx.fillText(`Floor ${gameState.floor} | Score: ${player.score}`, SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 + 40);
    }
    
    if (gameState.won) {
        gameCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        gameCtx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
        gameCtx.fillStyle = '#00ff00';
        gameCtx.font = 'bold 52px Arial';
        gameCtx.textAlign = 'center';
        gameCtx.textBaseline = 'middle';
        gameCtx.fillText('🎉 VICTORY! 🎉', SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 - 40);
        gameCtx.fillStyle = '#ffff00';
        gameCtx.font = '24px Arial';
        gameCtx.fillText(`Floor ${gameState.floor} | Score: ${player.score}`, SCREEN_WIDTH / 2, SCREEN_HEIGHT / 2 + 40);
    }
}

function circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(cx, rx + rw));
    const closestY = Math.max(ry, Math.min(cy, ry + rh));
    const dist = Math.hypot(cx - closestX, cy - closestY);
    return dist < cr;
}

function makeGameParticles(x, y, cnt, col) {
    let r, g, b;
    if (col === '#ff0000') { r = 255; g = 0; b = 0; }
    else if (col === '#00ff00') { r = 0; g = 255; b = 0; }
    else if (col === '#ffff00') { r = 255; g = 255; b = 0; }
    else if (col === '#ff6b6b') { r = 255; g = 107; b = 107; }
    else if (col === '#00aaff') { r = 0; g = 170; b = 255; }
    else if (col === '#ffaa00') { r = 255; g = 170; b = 0; }
    else { r = 255; g = 255; b = 255; }
    
    for (let i = 0; i < cnt; i++) {
        const ang = (Math.PI * 2 * i) / cnt + (Math.random() - 0.5) * 0.6;
        const spd = 2 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd,
            lifetime: 40,
            maxLifetime: 40,
            size: 2.5 + Math.random() * 3.5,
            r, g, b
        });
    }
}

function updateGameHUD() {
    document.getElementById('gameFloor').textContent = gameState.floor;
    document.getElementById('gameRoom').textContent = `${gameState.room}/10`;
    document.getElementById('gameLevel').textContent = player.level;
    document.getElementById('gameXP').textContent = `${player.xp}/${player.xpNext}`;
    
    const hpPct = (player.hp / player.maxHp) * 100;
    document.getElementById('healthBar').style.width = hpPct + '%';
    document.getElementById('healthText').textContent = `${Math.max(0, player.hp)}/${player.maxHp}`;
    
    document.getElementById('gameDamage').textContent = player.dmg.toFixed(1);
    document.getElementById('gameSpeed').textContent = player.spd.toFixed(1);
    document.getElementById('gameFire').textContent = (30 / player.fireRate).toFixed(2);
    document.getElementById('gameRange').textContent = player.range;
    document.getElementById('gameLuck').textContent = player.luck;
    
    document.getElementById('gameGold').textContent = player.gold;
    document.getElementById('gameBombs').textContent = player.bombs;
    document.getElementById('gameScore').textContent = player.score;
    
    const invDiv = document.getElementById('gameInventory');
    invDiv.innerHTML = '';
    player.inv.forEach(itemKey => {
        const item = ITEMS[itemKey];
        const slot = document.createElement('div');
        slot.className = 'itemSlot';
        slot.textContent = item.e;
        slot.title = item.n;
        invDiv.appendChild(slot);
    });
    
    for (let i = player.inv.length; i < 6; i++) {
        const slot = document.createElement('div');
        slot.className = 'itemSlot empty';
        slot.textContent = '◯';
        invDiv.appendChild(slot);
    }
}

function toggleGamePause() {
    if (!gameState.gameOver && !gameState.won) gameState.paused = !gameState.paused;
}

function nextGameRoom() {
    if (!rooms[curRoom].cleared) return;
    if (curRoom < rooms.length - 1) {
        loadGameRoom(curRoom + 1);
    } else {
        gameState.floor++;
        genGameFloor();
        loadGameRoom(0);
    }
}

function restartGameSession() {
    gameState = { floor: 1, room: 1, paused: false, gameOver: false, won: false };
    player = {
        x: MAP_W/2, y: MAP_H/2, vx: 0, vy: 0, r: PLAYER_R,
        maxHp: 10, hp: 10, dmg: 1, fireRate: 30, range: 100, spd: 1.5, luck: 0,
        gold: 0, bombs: 0, level: 1, xp: 0, xpNext: 100, score: 0, inv: [], active: null, invul: 0
    };
    genGameFloor();
    loadGameRoom(0);
}

function gameGameLoop() {
    updateGame();
    drawGame();
    requestAnimationFrame(gameGameLoop);
}
</script>
